<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://cdn.tailwindcss.com https://cdn.jsdelivr.net https://js.arcgis.com https://unpkg.com https://cdnjs.cloudflare.com; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://fonts.googleapis.com https://unpkg.com https://cdnjs.cloudflare.com https://js.arcgis.com; font-src 'self' https://js.arcgis.com https://fonts.gstatic.com https://cdnjs.cloudflare.com https://unpkg.com https://cdn.jsdelivr.net data:; img-src 'self' data: https:; connect-src 'self' blob: https://mtk.pythonanywhere.com https://*.supabase.co https://js.arcgis.com https://*.arcgis.com https://*.arcgisonline.com https://api.github.com https://raw.githubusercontent.com; frame-src 'self'; base-uri 'self'; object-src 'none';">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PropertyHub Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script defer src="./script.js"></script>
  <style>
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-50 font-sans text-gray-800">

<div class="flex flex-col md:flex-row h-screen">
  <aside class="w-full md:w-72 bg-white shadow-lg p-5 flex flex-col">
    <h1 class="text-2xl font-extrabold mb-5 text-indigo-900 border-b pb-4">🏠 Tany | LandTrust</h1>
    <ul class="space-y-3 overflow-y-auto flex-1" id="mails">
    </ul>
    <div class="mt-6 border-t pt-4">
      <button id = "admintalk" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2 rounded-lg font-semibold shadow transition">
        + Write to Admin
      </button>
    </div>
  </aside>

  <main class="flex-1 flex flex-col bg-slate-50">
    <header class="bg-white px-6 py-4 flex justify-between items-center shadow-md">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-blue-500 rounded-full flex items-center justify-center text-white font-bold">
          MC
        </div>
        <div>
          <h2 id = "object_earth" class="text-lg font-bold text-gray-900">Main Chats</h2>
          <p class="text-sm text-green-500">You are Online</p>
        </div>
      </div>
    </header>

    <section class="flex-1 p-6 space-y-6 overflow-y-auto" id="main_mess">
      <div class="flex items-start gap-3">
      </div>
    </section>

    <footer class="bg-white p-4 flex items-center gap-4 border-t shadow-inner">
      <input type="hidden" id="uuid_post" value="">
      <input id="saisie" type="text" placeholder="Ask about properties, prices, availability..." class="flex-1 px-5 py-3 rounded-full border border-gray-300 focus:ring-2 focus:ring-indigo-400 focus:outline-none transition" />
      <button id="text_sub" class="bg-indigo-600 hover:bg-indigo-700 text-white w-12 h-12 rounded-full flex items-center justify-center text-xl shadow transition">
        ➤
      </button>
    </footer>
  </main>
</div>

<div id="adminOverlay" onclick="closeAdminModal()"
  class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">
  <div onclick="event.stopPropagation()"
    class="bg-white rounded-xl shadow-xl p-6 w-full max-w-md mx-4 relative animate-fadeIn">

    <button onclick="closeAdminModal()"
      class="absolute top-3 right-4 text-gray-400 hover:text-gray-600 text-xl leading-none">✕</button>

    <h2 class="text-lg font-semibold mb-1">Write to Admin</h2>
    <p class="text-sm text-gray-500 mb-4">Your message will be sent directly to the admin team.</p>

    <div  class="mb-3">
      <label class="block text-sm text-gray-600 mb-1">Subject</label>
      <input id = "objadm" type="text" placeholder="e.g. Issue with my account"
        class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
    </div>

    <div class="mb-5">
      <label class="block text-sm text-gray-600 mb-1">Message</label>
      <input id = "msadm" rows="4" type="text" placeholder="Describe your issue or question..."
        class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 resize-y"></input>
    </div>

    <div class="flex justify-end gap-2">
      <button onclick="closeAdminModal()"
        class="px-4 py-2 text-sm border rounded-lg hover:bg-gray-50">Cancel</button>
      <button id="sendadmin" class="px-4 py-2 text-sm font-semibold bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg">
        Send message
      </button>
    </div>
  </div>
</div>

</body>
</html>
