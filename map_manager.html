<script>
        // Get all necessary elements
        const editButton = document.getElementById('edit_pa');
        const editModal = document.getElementById('editModal');
        const closeEditModalButton = document.getElementById('closeEditModal');
        const cancelEditButton = document.getElementById('cancelEditButton');

        // Function to SHOW the modal
        function openEditModal() {
            // Replace 'hidden' with 'flex' to make the modal visible and centered
            editModal.classList.remove('hidden');
            editModal.classList.add('flex');
        }

        // Function to HIDE the modal
        function closeEditModal() {
            // Replace 'flex' with 'hidden' to hide the modal
            editModal.classList.remove('flex');
            editModal.classList.add('hidden');
        }

        // --- Event Listeners ---

        // 1. Open the modal when the "Edit your Parcels" button is clicked
        if (editButton) {
            editButton.addEventListener('click', openEditModal);
        }

        // 2. Close the modal when the 'X' button is clicked
        if (closeEditModalButton) {
            closeEditModalButton.addEventListener('click', closeEditModal);
        }

        // 3. Close the modal when the 'Cancel' button is clicked
        if (cancelEditButton) {
            cancelEditButton.addEventListener('click', closeEditModal);
        }

        // 4. Close the modal when the user clicks the backdrop (outside the content box)
        if (editModal) {
            editModal.addEventListener('click', (event) => {
                // Check if the click occurred directly on the modal container itself (the dark backdrop)
                if (event.target === editModal) {
                    closeEditModal();
                }
            });
        }


        //
        const modal = document.getElementById("myModal");
        const openBtn = document.getElementById('import_kml');

        // Function to show the modal
        function openModal() {
        // Replace the 'hidden' class with 'flex' to display the modal and center its content
        modal.classList.remove('hidden');
        modal.classList.add('flex');
        }

        // Function to hide the modal
        function closeModal() {
        // Replace the 'flex' class with 'hidden' to hide the modal
        modal.classList.remove('flex');
        modal.classList.add('hidden');
        }

        // Attach event listeners
        openBtn.addEventListener('click', openModal);

        // Close when clicking outside the modal content area
        window.addEventListener('click', (event) => {
        if (event.target === modal) {
            closeModal();
        }
        });

// The close button inside the HTML calls closeModal() directly via its onclick attribute.
        //

        // NOTE: You'll also need to handle the 'Save Changes' button logic (id="saveChangesButton") 
        // based on what your ArcGIS map_manager.js needs to do!
    </script>
