<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdn.jsdelivr.net https://js.arcgis.com https://unpkg.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://fonts.googleapis.com https://unpkg.com https://cdnjs.cloudflare.com https://js.arcgis.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; connect-src 'self' https://mtk.pythonanywhere.com https://*.supabase.co https://js.arcgis.com https://*.arcgis.com https://*.arcgisonline.com; frame-src 'self'; base-uri 'self'; object-src 'none'">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parcel Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://js.arcgis.com/4.27/esri/themes/light/main.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="./main.js"></script>
    <script src="https://js.arcgis.com/4.27/"></script>
    <style>
        /* This is kept to ensure the map takes the full height of its container */
        #mapView {
            height: 100%; /* Changed from 100vh to 100% to work with container constraints */
        }
        /* Custom scrollbar to make the list look a bit cleaner (optional) */
        #parcelListContainer::-webkit-scrollbar {
            width: 8px;
        }
        #parcelListContainer::-webkit-scrollbar-thumb {
            background-color: #cbd5e1; /* gray-300 */
            border-radius: 4px;
        }
    </style>
</head>
<body class="bg-gray-100">
    <div class="flex flex-col h-screen md:flex-row">
        
        <div id="parcelListContainer" class="w-full h-1/2 bg-white shadow-lg overflow-y-auto md:h-full md:w-1/3">
            <div class="p-4 md:p-6">
                <h1 class="text-2xl md:text-3xl font-bold text-gray-800 mb-4 md:mb-6">Parcel Marketplace</h1>
                <div id="parcelList" class="space-y-4">
                    <p class="text-gray-500">Parcel list goes here...</p>
                    <p class="text-gray-500">Scroll down to see more...</p>
                  
                </div>
            </div>
        </div>

        <div class="w-full h-1/2 relative md:h-full md:w-2/3">
            <div id="mapView"></div>
        </div>
    </div>
</body>
</html>
