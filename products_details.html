  <title>Product Details</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="./prodd.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 2rem;
      background: #f8f9fa;
    }
    #product-detail {
      max-width: 600px;
      margin: auto;
      padding: 2rem;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
    }
    #product-detail img {
      max-width: 100%;
      height: auto;
      border-radius: 10px;
    }
    button {
      background-color: #007bff;
      border: none;
      padding: 10px 20px;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      border-radius: 5px;
      margin-top: 20px;
    }
    button:hover {
      background-color: #0056b3;
    }

  <div id="product-detail">Loading product...</div>
